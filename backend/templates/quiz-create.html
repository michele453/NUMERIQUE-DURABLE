{% extends "base.html" %}
{% block title %}Créer un quiz{% endblock %}

{% block content %}

<div style="max-width:680px; margin:0 auto;">

  <div class="flex-between mb-3">
    <h1>Créer un quiz</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-ghost btn-sm">← Retour</a>
  </div>

  <div class="alert alert-info" role="status">
    Ajoutez au minimum <strong>2 questions</strong> pour pouvoir activer le quiz.
  </div>

  <form id="quiz-form" action="{{ url_for('quiz_create') }}" method="POST" novalidate>

    <!-- Informations générales -->
    <div class="card mb-3">
      <div style="padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
        <h2 style="font-size:1rem; margin: 0;">Informations générales</h2>
      </div>

      <div class="form-group">
        <label for="titre">Titre du quiz *</label>
        <input type="text" id="titre" name="titre" required maxlength="100"
               placeholder="ex : Quiz Mathématiques Chapitre 3" aria-required="true">
      </div>

      <div class="form-group">
        <label for="description">Description (optionnel)</label>
        <textarea id="description" name="description" maxlength="500"
                  placeholder="Objectifs pédagogiques, niveau, chapitre concerné..."></textarea>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label for="duree_minutes">Durée de l'examen (minutes) *</label>
        <input type="number" id="duree_minutes" name="duree_minutes" min="1" value="60" required 
               aria-required="true">
      </div>
    </div>

    <!-- Questions -->
    <div class="card mb-3">
      <div style="padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
        <h2 style="font-size:1rem; margin: 0;">Questions</h2>
        <span class="badge badge-gray" id="question-count">0 question(s)</span>
      </div>

      <!-- Zone dynamique — questions ajoutées par JS -->
      <div id="questions-container">
        <!-- Exemple de question pré-remplie pour la démo -->
        <fieldset class="question-block" id="q-1">
          <legend>Question 1</legend>
          <div class="form-group mt-1">
            <label for="q1-texte">Énoncé</label>
            <input type="text" id="q1-texte" name="questions[0][texte]"
                   required placeholder="Quel est..." aria-required="true">
          </div>
          <div class="options-grid">
            <div class="form-group">
              <label for="q1-opt0">Option A</label>
              <input type="text" id="q1-opt0" name="questions[0][options][0]" required placeholder="Option A">
            </div>
            <div class="form-group">
              <label for="q1-opt1">Option B</label>
              <input type="text" id="q1-opt1" name="questions[0][options][1]" required placeholder="Option B">
            </div>
            <div class="form-group">
              <label for="q1-opt2">Option C</label>
              <input type="text" id="q1-opt2" name="questions[0][options][2]" required placeholder="Option C">
            </div>
            <div class="form-group">
              <label for="q1-opt3">Option D</label>
              <input type="text" id="q1-opt3" name="questions[0][options][3]" required placeholder="Option D">
            </div>
          </div>
          <div class="form-group">
            <label for="q1-reponse">Bonne réponse</label>
            <select id="q1-reponse" name="questions[0][index_bonne_rep]" required aria-required="true">
              <option value="">-- Choisir --</option>
              <option value="0">Option A</option>
              <option value="1">Option B</option>
              <option value="2">Option C</option>
              <option value="3">Option D</option>
            </select>
          </div>
          <button type="button" class="btn btn-danger btn-sm" onclick="removeQuestion(1)">
            Supprimer cette question
          </button>
        </fieldset>
      </div>

      <button type="button" class="btn btn-outline btn-sm mt-2" id="add-question-btn" onclick="addQuestion()">
        + Ajouter une question
      </button>
    </div>

    <!-- Statut -->
    <div class="card mb-3">
      <div class="form-group" style="margin-bottom:0;">
        <label for="statut">Statut à la création</label>
        <select id="statut" name="statut">
          <option value="actif">Actif (visible par les étudiants)</option>
          <option value="archive">Archivé (brouillon)</option>
        </select>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-gap">
      <button type="submit" class="btn btn-primary">Enregistrer le quiz</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Annuler</a>
    </div>

  </form>

</div>

<script src="{{ url_for('static', filename='js/quiz-builder.js') }}" defer></script>

{% endblock %}
